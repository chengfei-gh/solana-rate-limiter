name: Build & Test

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL 'https://release.anza.xyz/v1.18.26/install')"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI via AVM
        run: |
          cargo install --git https://github.com/coral-xyz/anchor --tag v0.30.1 avm
          avm install 0.30.1
          avm use 0.30.1
          echo "$HOME/.avm/bin" >> $GITHUB_PATH

      - name: Build
        run: anchor build

      - name: Show build output
        run: |
          ls -la target/deploy/
          echo "Program ID:"
          grep -o '"[A-Za-z0-9]\{44\}"' target/idl/rate_limiter.json | head -1

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: anchor-build-artifacts
          path: |
            target/deploy/rate_limiter.so
            target/idl/rate_limiter.json
          retention-days: 7
