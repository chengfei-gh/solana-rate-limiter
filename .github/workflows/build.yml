name: Build & Test

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL 'https://release.anza.xyz/v1.18.26/install')"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Cache cargo binaries
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-cargo-anchor-0.30.1
          restore-keys: ${{ runner.os }}-cargo-anchor-

      - name: Install Anchor CLI
        run: |
          export CARGO_NET_GIT_FETCH_WITH_CLI=true
          export CARGO_REGISTRIES_CRATES_IO_PROTOCOL=sparse
          cargo install anchor-cli@0.30.1

      - name: Build
        run: anchor build

      - name: Show build output
        run: |
          ls -la target/deploy/
          echo "Program ID:"
          grep -o '"[A-Za-z0-9]\{44\}"' target/idl/rate_limiter.json | head -1

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: anchor-build-artifacts
          path: |
            target/deploy/rate_limiter.so
            target/idl/rate_limiter.json
          retention-days: 7
